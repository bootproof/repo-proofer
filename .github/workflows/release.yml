name: Release

# Auto-publish to PyPI when a version tag (v0.x.y) is pushed.
#
# Setup required (one-time):
#   1. Create a PyPI API token at https://pypi.org/manage/account/token/
#      (scope: "Entire account" for first publish, or scope to repo-proofer after)
#   2. Add it as a repository secret named PYPI_API_TOKEN at:
#      https://github.com/bootproof/repo-proofer/settings/secrets/actions
#
# To release a new version:
#   1. Bump version in pyproject.toml AND proofer.py (__version__)
#   2. Commit: git commit -am "bump: v0.3.0"
#   3. Tag: git tag v0.3.0
#   4. Push: git push origin main && git push origin v0.3.0
#   5. This workflow builds the package and publishes to PyPI automatically.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    # Only run on tags, not on branch pushes
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package built correctly
        run: |
          echo "=== Wheel contents ==="
          unzip -l dist/*.whl
          echo "=== Entry points ==="
          unzip -p dist/*.whl "*/entry_points.txt"
          echo "=== Metadata ==="
          unzip -p dist/*.whl "*/METADATA" | head -15

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
